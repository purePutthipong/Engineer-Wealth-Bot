name: Engineer Wealth Bot Auto-Run

on:
  schedule:
    - cron: '0 1 * * *'  # รันทุกวันตอน 8 โมงเช้าไทย
  workflow_dispatch:
    inputs:
      qqqm_qty:
        description: 'จำนวนหุ้น QQQM'
        default: '0.47901'
      qqqm_cost:
        description: 'ราคาทุนเฉลี่ย QQQM ($)'
        default: '253.28'
      smh_qty:
        description: 'จำนวนหุ้น SMH'
        default: '0.12767'
      smh_cost:
        description: 'ราคาทุนเฉลี่ย SMH ($)'
        default: '399.83'
      cash_balance:
        description: 'เงินสดคงเหลือ ($)'
        default: '100.00'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests "numpy<2.0.0"

      - name: Run Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          INPUT_QQQM_QTY: ${{ github.event.inputs.qqqm_qty }}
          INPUT_QQQM_COST: ${{ github.event.inputs.qqqm_cost }}
          INPUT_SMH_QTY: ${{ github.event.inputs.smh_qty }}
          INPUT_SMH_COST: ${{ github.event.inputs.smh_cost }}
          INPUT_CASH_BALANCE: ${{ github.event.inputs.cash_balance }}
        run: python bot.py
