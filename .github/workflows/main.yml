name: Engineer Wealth Bot Auto-Run

on:
  schedule:    
    # รอบเช้า 08:00 เวลาไทย (UTC+7)
    - cron: '0 1 * * 1-5'
    
    # รอบดึก (21:15)
    - cron: '15 14 * * 1-5'
  workflow_dispatch:       # เหลือแค่นี้พอครับ (ไม่ต้องมี inputs ต่อท้าย)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests "numpy<2.0.0"

      - name: Run Trading Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # บอทจะวิ่งไปหยิบข้อมูลล่าสุดจาก Settings โดยตรง ไม่ต้องกรอกมือแล้ว
          INPUT_QQQM_QTY: ${{ vars.QQQM_QTY }}
          INPUT_QQQM_COST: ${{ vars.QQQM_COST }}
          INPUT_SMH_QTY: ${{ vars.SMH_QTY }}
          INPUT_SMH_COST: ${{ vars.SMH_QTY }}
          INPUT_CASH_BALANCE: ${{ vars.PORT_CASH }}
        run: python bot.py