name: Engineer Wealth Bot Auto-Run

on:
  schedule:
    # ตั้งเป็น 18:00 UTC (เท่ากับ 01:00 น. ตีหนึ่งเมืองไทย)
    - cron: '0 18 * * *'
    - cron: '0 1 * * *'    # 08:00 น. (แก้เป็น * เพื่อให้รันวันเสาร์-อาทิตย์ด้วย)
    - cron: '0 14 * * 1-5' # 21:00 น. (จันทร์-ศุกร์ เหมือนเดิม)
  workflow_dispatch:       # เหลือแค่นี้พอครับ (ไม่ต้องมี inputs ต่อท้าย)

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests "numpy<2.0.0"

      - name: Run Trading Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # บอทจะวิ่งไปหยิบข้อมูลล่าสุดจาก Settings โดยตรง ไม่ต้องกรอกมือแล้ว
          INPUT_QQQM_QTY: ${{ vars.QQQM_QTY }}
          INPUT_QQQM_COST: ${{ vars.QQQM_COST }}
          INPUT_SMH_QTY: ${{ vars.SMH_QTY }}
          INPUT_SMH_COST: ${{ vars.SMH_COST }}
          INPUT_CASH_BALANCE: ${{ vars.PORT_CASH }}
        run: python bot.py
