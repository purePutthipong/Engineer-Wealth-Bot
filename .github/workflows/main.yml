name: Engineer Wealth Bot Auto-Run

on:
  schedule:
    - cron: '0 1 * * 1-5'  # เวลา 08:00 น. ไทย (จันทร์-ศุกร์)
    - cron: '0 14 * * 1-5' # เวลา 21:00 น. ไทย (จันทร์-ศุกร์)
  workflow_dispatch:      # ปุ่มกดรันเองยังอยู่เหมือนเดิม
    inputs:
      qqqm_qty:
        description: 'จำนวนหุ้น QQQM'
        default: '0.47901'
      qqqm_cost:
        description: 'ราคาทุนเฉลี่ย QQQM ($)'
        default: '253.28'
      smh_qty:
        description: 'จำนวนหุ้น SMH'
        default: '0.12767'
      smh_cost:
        description: 'ราคาทุนเฉลี่ย SMH ($)'
        default: '399.83'
      cash_balance:
        description: 'เงินสดคงเหลือ ($)'
        default: '100.00'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests "numpy<2.0.0"

      - name: Run Trading Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          # เชื่อมตัวแปรจาก GitHub Variables เข้าสู่ Python
          INPUT_QQQM_QTY: ${{ vars.QQQM_QTY }}
          INPUT_QQQM_COST: ${{ vars.QQQM_COST }}
          INPUT_SMH_QTY: ${{ vars.SMH_QTY }}
          INPUT_SMH_COST: ${{ vars.SMH_COST }}
          INPUT_CASH_BALANCE: ${{ vars.PORT_CASH }}
        run: python bot.py
