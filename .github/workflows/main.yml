name: Engineer Wealth Bot Auto-Run

on:
  schedule:
    # รอบเช้า 08:00 เวลาไทย (UTC+7)
    - cron: '0 1 * * 1-5'
    # รอบดึก 21:15 เวลาไทย
    - cron: '15 14 * * 1-5'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # ต้องให้สิทธิ์เขียน repo เพื่อ commit signal_state.json กลับ
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install yfinance pandas requests "numpy<2.0.0"

      - name: Run Trading Bot
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python bot.py

      # บันทึก signal_state.json กลับเข้า repo
      # เพื่อให้รอบถัดไปเปรียบเทียบ signal ได้
      - name: Save signal state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add signal_state.json
          git diff --cached --quiet || git commit -m "update signal state [skip ci]"
          git push
